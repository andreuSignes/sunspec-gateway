# OpenSpec configuration for solar-home
# Generated by sdd-init. Downstream phases (propose, spec, design, tasks, apply, verify, archive)
# respect these rules.

schema_version: "1.0"
artifact_store: openspec
project: solar-home

# Project context — short, under 10 lines per the convention.
context: |
  SunSpec Modbus TCP Gateway microservice in NestJS that polls a Solplanet
  ASW H-S2 inverter via HTTP CGI and re-exposes the data as a standard
  Modbus TCP server following the SunSpec Information Model, so Home
  Assistant's built-in SunSpec integration reads it natively. Stack:
  NestJS + TypeScript + node-modbus-serial.

# Preflight selections for this SDD cycle.
preflight:
  mode: automatic            # A2 — no pauses between phases
  artifact_store: openspec   # B1 — openspec/ directory
  risk_policy: ask-on-risk   # C1 — ask the user on PR/scope risk
  review_budget: 400         # D1 — ~400 changed lines per PR

# Strict TDD is OFF until sdd-apply scaffolds a test runner.
testing:
  strict_tdd: false
  test_command: null
  detected_runner: null
  detected_test_layers: {}
  detected_coverage: false
  detected_quality: {}
  reason: "No package.json yet. sdd-apply will scaffold vitest + @nestjs/testing."

# Phase rules — orchestrator references these when launching the next phase.
phases:
  propose: { artifact: openspec/changes/<change>/proposal.md }
  spec:    { artifact: openspec/changes/<change>/specs/**/*.md }
  design:  { artifact: openspec/changes/<change>/design.md }
  tasks:   { artifact: openspec/changes/<change>/tasks.md }
  apply:   { workspace: src/ }
  verify:  { command: "npm test" }
  archive: { target: openspec/specs/ }