name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Read Node version from .npmrc
        id: node
        run: echo "version=$(grep -E '^node-version=' .npmrc | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # Install pnpm before actions/setup-node because setup-node's `cache: 'pnpm'`
      # invokes `pnpm` to compute cache keys — if pnpm isn't on PATH yet, the step
      # fails with "Unable to locate executable file: pnpm".
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        run: |
          pnpm dlx commitlint --from=HEAD~5 --to=HEAD --verbose

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --coverage