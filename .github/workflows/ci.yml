name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          # commitlint --from=HEAD~5 needs full history (PRs default to depth=1)
          fetch-depth: 0

      - name: Read Node version from .npmrc
        id: node
        run: echo "version=$(grep -E '^node-version=' .npmrc | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # Install pnpm before actions/setup-node because setup-node's `cache: 'pnpm'`
      # invokes `pnpm` to compute cache keys — if pnpm isn't on PATH yet, the step
      # fails with "Unable to locate executable file: pnpm".
      # Don't pass `version:` here: package.json's `packageManager: pnpm@11.0.0` is
      # the source of truth, and pnpm/action-setup@v4 errors if both are set.
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node.outputs.version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint commit messages
        # Check only the latest commit: the per-commit hook is the primary defense
        # for interactive commits, and `HEAD~1..HEAD` still catches squashed-merge
        # bypasses from the GitHub web editor. A wider range (e.g., --from=HEAD~5
        # or --from=merge-base) would also lint PR1 commits that predate this
        # convention — they pass through the hook on merge.
        run: pnpm dlx commitlint --from=HEAD~1 --to=HEAD --verbose

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --coverage